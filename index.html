<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superyacht Salon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050a10; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(235, 210, 160, 0.45);
      font-family: system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.14em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hint">drag to look around the salon</div>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1420);

    const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.05, 60);
    camera.position.set(0, 0.25, 4.3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.95;
    document.body.appendChild(renderer.domElement);

    // ── Procedural textures ────────────────────────────────────────────────

    // Teak-and-holly sole: golden planks with pale holly stripes
    function teakTex(rx, ry) {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      const ctx = c.getContext('2d');
      const pw = 58;
      for (let x = 0; x < 512; x += pw) {
        const l = 26 + Math.random() * 10;
        ctx.fillStyle = `hsl(${28 + Math.random() * 7}, 46%, ${l}%)`;
        ctx.fillRect(x, 0, pw, 512);
        // grain streaks
        for (let i = 0; i < 22; i++) {
          const gx = x + 4 + Math.random() * (pw - 8);
          ctx.strokeStyle = `rgba(60,32,8,${0.06 + Math.random() * 0.12})`;
          ctx.lineWidth = 0.6 + Math.random() * 1.2;
          ctx.beginPath();
          ctx.moveTo(gx, 0);
          ctx.bezierCurveTo(gx + 6, 170, gx - 6, 340, gx + 3, 512);
          ctx.stroke();
        }
        // pale holly stripe between planks
        ctx.fillStyle = '#ddceA6';
        ctx.fillRect(x + pw - 4, 0, 4, 512);
        // subtle butt joints
        const jy = Math.random() * 512;
        ctx.fillStyle = 'rgba(40,20,5,0.35)';
        ctx.fillRect(x, jy, pw - 4, 1.5);
      }
      const t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(rx, ry);
      return t;
    }

    // Sunset ocean panorama for the bow windows
    function oceanTex() {
      const c = document.createElement('canvas');
      c.width = 2048; c.height = 512;
      const ctx = c.getContext('2d');
      const HOR = 300;

      const sky = ctx.createLinearGradient(0, 0, 0, HOR);
      sky.addColorStop(0, '#274a72');
      sky.addColorStop(0.5, '#7fa3c2');
      sky.addColorStop(0.85, '#f0b071');
      sky.addColorStop(1, '#ffd9a2');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, 2048, HOR);

      // sun and glow
      const glow = ctx.createRadialGradient(1024, HOR - 14, 8, 1024, HOR - 14, 220);
      glow.addColorStop(0, 'rgba(255,240,210,0.95)');
      glow.addColorStop(0.25, 'rgba(255,190,110,0.5)');
      glow.addColorStop(1, 'rgba(255,160,60,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, 2048, HOR + 40);
      ctx.beginPath();
      ctx.arc(1024, HOR - 26, 34, 0, Math.PI * 2);
      ctx.fillStyle = '#fff3da';
      ctx.fill();

      // soft clouds
      for (let i = 0; i < 26; i++) {
        const cy = 30 + Math.random() * (HOR - 90);
        ctx.fillStyle = `rgba(255,225,195,${0.05 + Math.random() * 0.12})`;
        ctx.beginPath();
        ctx.ellipse(Math.random() * 2048, cy, 60 + Math.random() * 160, 6 + Math.random() * 14, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // distant islands
      ctx.fillStyle = 'rgba(40,55,75,0.75)';
      ctx.beginPath();
      ctx.ellipse(320, HOR, 130, 16, 0, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(1760, HOR, 90, 10, 0, Math.PI, 0);
      ctx.fill();

      // sea
      const sea = ctx.createLinearGradient(0, HOR, 0, 512);
      sea.addColorStop(0, '#c98a55');
      sea.addColorStop(0.12, '#3f6a86');
      sea.addColorStop(1, '#142e44');
      ctx.fillStyle = sea;
      ctx.fillRect(0, HOR, 2048, 512 - HOR);

      // wave shimmer
      for (let i = 0; i < 700; i++) {
        const y = HOR + Math.pow(Math.random(), 1.6) * (512 - HOR);
        const w = 4 + Math.random() * (y - HOR) * 0.35;
        ctx.fillStyle = `rgba(200,225,240,${0.04 + Math.random() * 0.1})`;
        ctx.fillRect(Math.random() * 2048, y, w, 1.2);
      }
      // sun glitter path
      for (let i = 0; i < 240; i++) {
        const y = HOR + Math.pow(Math.random(), 1.4) * (512 - HOR);
        const spread = 40 + (y - HOR) * 0.55;
        ctx.fillStyle = `rgba(255,215,150,${0.12 + Math.random() * 0.3})`;
        ctx.fillRect(1024 + (Math.random() - 0.5) * spread, y, 3 + Math.random() * 10, 1.4);
      }

      // gulls
      ctx.strokeStyle = 'rgba(30,40,55,0.7)';
      ctx.lineWidth = 1.6;
      [[520, 120], [575, 100], [1420, 150]].forEach(([gx, gy]) => {
        ctx.beginPath();
        ctx.moveTo(gx - 9, gy);
        ctx.quadraticCurveTo(gx - 4, gy - 6, gx, gy);
        ctx.quadraticCurveTo(gx + 4, gy - 6, gx + 9, gy);
        ctx.stroke();
      });

      return new THREE.CanvasTexture(c);
    }

    // Small sky/sea view for portholes
    function portholeTex() {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 256;
      const ctx = c.getContext('2d');
      const HOR = 140;
      const sky = ctx.createLinearGradient(0, 0, 0, HOR);
      sky.addColorStop(0, '#5b84a8');
      sky.addColorStop(1, '#f4c286');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, 256, HOR);
      const sea = ctx.createLinearGradient(0, HOR, 0, 256);
      sea.addColorStop(0, '#b57e50');
      sea.addColorStop(0.2, '#38607c');
      sea.addColorStop(1, '#16324a');
      ctx.fillStyle = sea;
      ctx.fillRect(0, HOR, 256, 116);
      for (let i = 0; i < 90; i++) {
        const y = HOR + Math.random() * 116;
        ctx.fillStyle = `rgba(210,230,240,${0.05 + Math.random() * 0.14})`;
        ctx.fillRect(Math.random() * 256, y, 3 + Math.random() * 14, 1);
      }
      return new THREE.CanvasTexture(c);
    }

    // Framed nautical chart
    function chartTex() {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 384;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#e9dfc4';
      ctx.fillRect(0, 0, 512, 384);
      // coastline
      ctx.fillStyle = '#cdbd97';
      ctx.beginPath();
      ctx.moveTo(0, 60);
      ctx.bezierCurveTo(120, 20, 200, 140, 90, 220);
      ctx.bezierCurveTo(40, 270, 0, 240, 0, 240);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#6a5a38';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // depth contours
      for (let i = 0; i < 7; i++) {
        ctx.strokeStyle = `rgba(90,120,150,${0.25 + i * 0.06})`;
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(60 + i * 22, 380);
        ctx.bezierCurveTo(160 + i * 30, 260 - i * 12, 300 + i * 18, 300 - i * 20, 512, 180 - i * 14);
        ctx.stroke();
      }
      // soundings
      ctx.fillStyle = 'rgba(70,80,95,0.7)';
      for (let i = 0; i < 40; i++) {
        ctx.fillRect(140 + Math.random() * 360, 60 + Math.random() * 300, 2, 2);
      }
      // compass rose
      const cx = 400, cy = 110;
      ctx.strokeStyle = '#5a4a30';
      ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.arc(cx, cy, 46, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, 34, 0, Math.PI * 2); ctx.stroke();
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * (i % 2 ? 30 : 44), cy + Math.sin(a) * (i % 2 ? 30 : 44));
        ctx.stroke();
      }
      ctx.fillStyle = '#a03024';
      ctx.beginPath();
      ctx.moveTo(cx, cy - 46); ctx.lineTo(cx - 5, cy - 28); ctx.lineTo(cx + 5, cy - 28);
      ctx.closePath();
      ctx.fill();
      // rhumb lines
      ctx.strokeStyle = 'rgba(90,74,48,0.35)';
      ctx.lineWidth = 0.7;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * 500, cy + Math.sin(a) * 500);
        ctx.stroke();
      }
      return new THREE.CanvasTexture(c);
    }

    // ── Materials ─────────────────────────────────────────────────────────

    const floorTex  = teakTex(6, 2);
    const wtex      = teakTex(1.5, 1);
    const panelTex  = teakTex(3, 1);
    const seaTex    = oceanTex();
    const portTex   = portholeTex();
    const mapTex    = chartTex();

    const mTeakF  = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.35, metalness: 0.02 });
    const mTeak   = new THREE.MeshStandardMaterial({ map: wtex, roughness: 0.45, metalness: 0.03 });
    const mPanel  = new THREE.MeshStandardMaterial({ map: panelTex, roughness: 0.5, metalness: 0.03 });
    const mHull   = new THREE.MeshStandardMaterial({ color: 0xf2ecdf, roughness: 0.9, side: THREE.DoubleSide });
    const mCeil   = new THREE.MeshStandardMaterial({ color: 0xfaf6ee, roughness: 0.95 });
    const mBrass  = new THREE.MeshStandardMaterial({ color: 0xb08a2e, roughness: 0.25, metalness: 0.85 });
    const mBrassS = new THREE.MeshStandardMaterial({ color: 0xc5a24a, roughness: 0.55, metalness: 0.4 });
    const mCream  = new THREE.MeshStandardMaterial({ color: 0xf6f1e6, roughness: 0.9 });
    const mNavy   = new THREE.MeshStandardMaterial({ color: 0x16263e, roughness: 0.95 });
    const mRope   = new THREE.MeshStandardMaterial({ color: 0xcbb188, roughness: 1 });
    const mGlass  = new THREE.MeshStandardMaterial({ color: 0x9fc4d8, roughness: 0, metalness: 0.1, opacity: 0.1, transparent: true, side: THREE.DoubleSide });
    const mSea    = new THREE.MeshBasicMaterial({ map: seaTex, side: THREE.DoubleSide });
    const mPort   = new THREE.MeshBasicMaterial({ map: portTex });
    const mChart  = new THREE.MeshStandardMaterial({ map: mapTex, roughness: 0.85 });
    const mShade  = new THREE.MeshStandardMaterial({ color: 0xe8d9b0, roughness: 0.85, emissive: new THREE.Color(0x8a6828), emissiveIntensity: 0.6 });
    const mDownlt = new THREE.MeshStandardMaterial({ color: 0xfff0d0, emissive: new THREE.Color(0xffd890), emissiveIntensity: 1.4 });
    const mWhiteF = new THREE.MeshStandardMaterial({ color: 0xf4efe4, roughness: 0.6 });

    // ── Helpers ───────────────────────────────────────────────────────────

    function box(w, h, d, mat, px, py, pz, ry = 0) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      m.position.set(px, py, pz);
      m.rotation.y = ry;
      m.castShadow = true;
      m.receiveShadow = true;
      scene.add(m);
      return m;
    }
    function cyl(rt, rb, h, seg, mat, px, py, pz, rx = 0, rz = 0) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
      m.position.set(px, py, pz);
      m.rotation.x = rx;
      m.rotation.z = rz;
      m.castShadow = true;
      m.receiveShadow = true;
      scene.add(m);
      return m;
    }
    function sph(r, mat, px, py, pz) {
      const m = new THREE.Mesh(new THREE.SphereGeometry(r, 16, 12), mat);
      m.position.set(px, py, pz);
      m.castShadow = true;
      scene.add(m);
      return m;
    }
    // Curved band of hull wall around the bow (half-cylinder, open ended)
    function arcBand(r, h, y, mat, cz) {
      const g = new THREE.CylinderGeometry(r, r, h, 48, 1, true, Math.PI / 2, Math.PI);
      const m = new THREE.Mesh(g, mat);
      m.position.set(0, y, cz);
      m.castShadow = true;
      m.receiveShadow = true;
      scene.add(m);
      return m;
    }

    // ── Salon shell ───────────────────────────────────────────────────────
    // Straight section 8 wide, z from -2.5 (bow curve start) to +5.5 (aft
    // bulkhead); a semicircular bow of radius 4 curves forward from z = -2.5.

    const RW = 8, RH = 2.7;
    const hw = RW / 2, hh = RH / 2;
    const F = -hh;            // sole (floor) Y
    const BOWC = -2.5;        // bow curve center Z
    const STERN = 5.5;

    box(RW, 0.06, 8, mTeakF, 0, F, 1.5);                    // teak sole
    cyl(hw, hw, 0.06, 48, mTeakF, 0, F, BOWC).geometry =    // bow half-disc sole
      new THREE.CylinderGeometry(hw, hw, 0.06, 48, 1, false, Math.PI / 2, Math.PI);
    box(RW, 0.06, 8, mCeil, 0, hh, 1.5);                    // overhead
    cyl(hw, hw, 0.06, 48, mCeil, 0, hh, BOWC).geometry =
      new THREE.CylinderGeometry(hw, hw, 0.06, 48, 1, false, Math.PI / 2, Math.PI);

    box(0.08, RH, 8, mHull, -hw, 0, 1.5);                   // port wall
    box(0.08, RH, 8, mHull,  hw, 0, 1.5);                   // starboard wall
    box(RW, RH, 0.1, mPanel, 0, 0, STERN);                  // aft teak bulkhead

    // Curved bow wall: cream sill and header with a wraparound window band
    const sillTop = F + 0.7, winTop = F + 2.0;
    arcBand(4.0, 0.7, F + 0.35, mHull, BOWC);                        // sill
    arcBand(4.0, RH - 2.0, (winTop + hh) / 2, mHull, BOWC);          // header
    arcBand(4.3, 2.0, 0, mSea, BOWC);                                // ocean panorama
    arcBand(4.0, winTop - sillTop, (sillTop + winTop) / 2, mGlass, BOWC); // glazing
    arcBand(3.97, 0.06, sillTop, mBrass, BOWC);                      // brass sill rail
    arcBand(3.97, 0.06, winTop, mBrass, BOWC);                       // brass head rail

    // Window mullions dividing the sweep into six panes
    for (let i = 0; i <= 6; i++) {
      const th = Math.PI / 2 + (i / 6) * Math.PI;
      box(0.07, winTop - sillTop, 0.09, mBrass,
        3.98 * Math.sin(th), (sillTop + winTop) / 2, BOWC + 3.98 * Math.cos(th), th);
    }

    // Crown trim and brass toe-kick on the straight walls
    box(0.06, 0.08, 8, mBrass, -hw + 0.05, hh - 0.05, 1.5);
    box(0.06, 0.08, 8, mBrass,  hw - 0.05, hh - 0.05, 1.5);
    box(RW, 0.08, 0.06, mBrass, 0, hh - 0.05, STERN - 0.06);
    box(0.05, 0.09, 8, mBrass, -hw + 0.05, F + 0.045, 1.5);
    box(0.05, 0.09, 8, mBrass,  hw - 0.05, F + 0.045, 1.5);
    box(RW, 0.09, 0.05, mBrass, 0, F + 0.045, STERN - 0.06);

    // Brass grab rails along both walls
    cyl(0.024, 0.024, 7.4, 10, mBrass, -hw + 0.1, -0.3, 1.5, Math.PI / 2);
    cyl(0.024, 0.024, 7.4, 10, mBrass,  hw - 0.1, -0.3, 1.5, Math.PI / 2);

    // ── Portholes (both side walls) ───────────────────────────────────────

    function porthole(side, z) {
      const x = side * (hw - 0.05);
      const disc = new THREE.Mesh(new THREE.CircleGeometry(0.26, 32), mPort);
      disc.position.set(x - side * 0.01, 0.35, z);
      disc.rotation.y = -side * Math.PI / 2;
      scene.add(disc);
      const rim = new THREE.Mesh(new THREE.TorusGeometry(0.27, 0.035, 12, 36), mBrass);
      rim.position.set(x - side * 0.03, 0.35, z);
      rim.rotation.y = Math.PI / 2;
      rim.castShadow = true;
      scene.add(rim);
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + 0.26;
        sph(0.018, mBrass, x - side * 0.045, 0.35 + Math.sin(a) * 0.31, z + Math.cos(a) * 0.31);
      }
    }
    [-0.8, 1.6, 4.0].forEach(z => { porthole(-1, z); porthole(1, z); });

    // ── Built-in lounge wrapping the bow windows ──────────────────────────

    const NB = 9;
    for (let i = 0; i < NB; i++) {
      const th = Math.PI * (0.68 + 0.64 * (i / (NB - 1)));
      const sx = Math.sin(th), cz = Math.cos(th);
      box(0.84, 0.38, 0.62, mTeak,  3.4 * sx, F + 0.19, BOWC + 3.4 * cz, th);   // teak base
      box(0.84, 0.16, 0.62, mCream, 3.4 * sx, F + 0.46, BOWC + 3.4 * cz, th);   // seat cushion
      box(0.86, 0.46, 0.13, mCream, 3.72 * sx, F + 0.72, BOWC + 3.72 * cz, th); // backrest
      if (i % 2 === 1) {
        box(0.4, 0.32, 0.12, mNavy, 3.52 * sx, F + 0.72, BOWC + 3.52 * cz, th + 0.12);
      }
    }

    // Round rug and pedestal cocktail table at the bow
    cyl(1.5, 1.5, 0.02, 40, mCream, 0, F + 0.045, BOWC - 1.6);
    cyl(0.34, 0.4, 0.05, 24, mBrass, 0, F + 0.09, BOWC - 1.6);
    cyl(0.05, 0.07, 0.56, 14, mBrass, 0, F + 0.4, BOWC - 1.6);
    cyl(0.6, 0.6, 0.045, 32, mTeak, 0, F + 0.7, BOWC - 1.6);
    cyl(0.13, 0.08, 0.07, 18, mBrassS, 0, F + 0.76, BOWC - 1.6);   // brass bowl
    // coiled rope decor on the table
    const coil = new THREE.Mesh(new THREE.TorusGeometry(0.09, 0.022, 8, 24), mRope);
    coil.position.set(0.28, F + 0.735, BOWC - 1.45);
    coil.rotation.x = Math.PI / 2;
    scene.add(coil);

    // ── Main salon seating ────────────────────────────────────────────────

    // Rug
    box(3.5, 0.015, 3.9, mCream, 0, F + 0.035, 0.9);
    box(3.2, 0.02, 3.6, mNavy, 0, F + 0.045, 0.9);

    function loungeChair(x, z, ry) {
      const g = new THREE.Group();
      const add = (geo, mat, px, py, pz) => {
        const m = new THREE.Mesh(geo, mat);
        m.position.set(px, py, pz);
        m.castShadow = m.receiveShadow = true;
        g.add(m);
      };
      add(new THREE.CylinderGeometry(0.16, 0.24, 0.06, 20), mBrass, 0, 0.03, 0);
      add(new THREE.CylinderGeometry(0.04, 0.04, 0.24, 10), mBrass, 0, 0.17, 0);
      add(new THREE.BoxGeometry(0.74, 0.26, 0.7), mCream, 0, 0.42, 0);
      add(new THREE.BoxGeometry(0.74, 0.66, 0.15), mCream, 0, 0.8, 0.31);
      add(new THREE.BoxGeometry(0.13, 0.3, 0.62), mCream, -0.37, 0.68, 0.02);
      add(new THREE.BoxGeometry(0.13, 0.3, 0.62), mCream,  0.37, 0.68, 0.02);
      add(new THREE.BoxGeometry(0.36, 0.3, 0.1), mNavy, 0, 0.76, 0.23);
      g.position.set(x, F, z);
      g.rotation.y = ry;
      scene.add(g);
    }
    loungeChair(-1.6, 0.3, -0.3);
    loungeChair( 1.6, 0.3,  0.3);

    // Brass-and-teak side table between the chairs
    cyl(0.04, 0.05, 0.52, 12, mBrass, 0, F + 0.28, 0.55);
    cyl(0.26, 0.26, 0.035, 24, mTeak, 0, F + 0.55, 0.55);
    cyl(0.2, 0.2, 0.06, 24, mBrass, 0, F + 0.05, 0.55);

    // ── Starboard bar cabinet ─────────────────────────────────────────────

    box(0.55, 0.9, 2.0, mTeak, 3.6, F + 0.45, 2.4);
    box(0.57, 0.03, 2.05, mBrass, 3.6, F + 0.915, 2.4);
    box(0.02, 0.55, 1.8, mBrass, 3.32, F + 0.45, 2.4);           // door trim
    box(0.45, 0.015, 0.32, mBrassS, 3.6, F + 0.94, 2.1);          // tray
    cyl(0.05, 0.06, 0.2, 12, mGlass, 3.6, F + 1.04, 2.05);        // decanter
    sph(0.03, mGlass, 3.6, F + 1.17, 2.05);
    cyl(0.035, 0.03, 0.09, 10, mGlass, 3.52, F + 0.99, 2.18);     // tumblers
    cyl(0.035, 0.03, 0.09, 10, mGlass, 3.68, F + 0.99, 2.18);
    box(0.5, 0.015, 0.02, mBrass, 3.6, F + 1.0, 2.32);            // fiddle rail

    // ── Port console with lamp ────────────────────────────────────────────

    box(0.5, 0.8, 1.5, mTeak, -3.6, F + 0.4, 2.4);
    box(0.52, 0.03, 1.55, mWhiteF, -3.6, F + 0.815, 2.4);
    cyl(0.05, 0.09, 0.07, 12, mBrass, -3.6, F + 0.86, 2.4);
    cyl(0.022, 0.022, 0.34, 10, mBrass, -3.6, F + 1.05, 2.4);
    cyl(0.17, 0.12, 0.22, 16, mShade, -3.6, F + 1.3, 2.4);

    // Framed nautical chart above the console
    box(1.2, 0.85, 0.03, mChart, -hw + 0.08, 0.55, 2.4, Math.PI / 2);
    box(0.03, 0.93, 0.06, mBrass, -hw + 0.07, 0.55, 2.4 - 0.62, Math.PI / 2);
    box(0.03, 0.93, 0.06, mBrass, -hw + 0.07, 0.55, 2.4 + 0.62, Math.PI / 2);
    box(1.28, 0.04, 0.06, mBrass, -hw + 0.07, 0.99, 2.4, Math.PI / 2);
    box(1.28, 0.04, 0.06, mBrass, -hw + 0.07, 0.11, 2.4, Math.PI / 2);

    // ── Aft bulkhead: ship's wheel, clock, trim ───────────────────────────

    box(0.04, RH - 0.3, 0.04, mBrass, -1.35, 0, STERN - 0.08);
    box(0.04, RH - 0.3, 0.04, mBrass,  1.35, 0, STERN - 0.08);

    // Ship's wheel
    const wheel = new THREE.Mesh(new THREE.TorusGeometry(0.42, 0.035, 12, 40), mTeak);
    wheel.position.set(0, 0.3, STERN - 0.14);
    wheel.castShadow = true;
    scene.add(wheel);
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      cyl(0.018, 0.018, 1.06, 8, mTeak, 0, 0.3, STERN - 0.14, 0, a + Math.PI / 2);
      sph(0.028, mBrassS, Math.cos(a) * 0.53, 0.3 + Math.sin(a) * 0.53, STERN - 0.14);
    }
    cyl(0.07, 0.07, 0.07, 16, mBrass, 0, 0.3, STERN - 0.14, Math.PI / 2);

    // Ship's clock (brass bezel, white face, hands)
    cyl(0.17, 0.17, 0.05, 24, mBrass, 2.2, 0.45, STERN - 0.1, Math.PI / 2);
    cyl(0.135, 0.135, 0.052, 24, mWhiteF, 2.2, 0.45, STERN - 0.11, Math.PI / 2);
    box(0.014, 0.1, 0.012, mNavy, 2.2, 0.49, STERN - 0.145);
    box(0.075, 0.014, 0.012, mNavy, 2.23, 0.45, STERN - 0.145);

    // Life ring on the aft wall
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.26, 0.06, 12, 32), mWhiteF);
    ring.position.set(-2.2, 0.45, STERN - 0.12);
    ring.castShadow = true;
    scene.add(ring);
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
      box(0.13, 0.13, 0.125, mNavy, -2.2 + Math.cos(a) * 0.26, 0.45 + Math.sin(a) * 0.26, STERN - 0.12);
    }

    // ── Overhead: beams, downlights, bow pendant ──────────────────────────

    [-1.4, 0.6, 2.6, 4.6].forEach(z => box(RW - 0.3, 0.08, 0.16, mTeak, 0, hh - 0.06, z));

    const spots = [[-1.8, -0.5], [1.8, -0.5], [-1.8, 3.6], [1.8, 3.6], [0, 1.6]];
    spots.forEach(([x, z]) => {
      cyl(0.07, 0.07, 0.025, 16, mBrass, x, hh - 0.045, z);
      cyl(0.048, 0.048, 0.012, 16, mDownlt, x, hh - 0.06, z);
    });

    // Pendant over the bow table
    cyl(0.015, 0.015, 0.36, 8, mBrass, 0, hh - 0.2, BOWC - 1.6);
    cyl(0.2, 0.27, 0.2, 20, mBrass, 0, hh - 0.46, BOWC - 1.6);
    cyl(0.16, 0.16, 0.02, 20, mDownlt, 0, hh - 0.55, BOWC - 1.6);

    // ── Lighting ──────────────────────────────────────────────────────────

    scene.add(new THREE.AmbientLight(0x362a1c, 0.85));

    // Main salon downlight (only shadow caster)
    const main = new THREE.PointLight(0xffe2b0, 2.4, 12);
    main.position.set(0, hh - 0.3, 0.9);
    main.castShadow = true;
    main.shadow.mapSize.set(1024, 1024);
    main.shadow.radius = 8;
    scene.add(main);

    // Pendant glow at the bow
    const bowP = new THREE.PointLight(0xffd9a8, 1.5, 8);
    bowP.position.set(0, hh - 0.65, BOWC - 1.6);
    scene.add(bowP);

    // Sunset spilling through the bow windows
    const sun = new THREE.PointLight(0xffb070, 1.5, 11);
    sun.position.set(0, 0.4, BOWC - 2.6);
    scene.add(sun);
    const skyFill = new THREE.PointLight(0x86a8c8, 0.55, 9);
    skyFill.position.set(0, 1.0, BOWC - 1.0);
    scene.add(skyFill);

    // Console lamp
    const lamp = new THREE.PointLight(0xffcc70, 0.8, 4);
    lamp.position.set(-3.5, F + 1.35, 2.4);
    scene.add(lamp);

    // Warm bounce off the teak sole
    const bounce = new THREE.PointLight(0x33220f, 0.4, 8);
    bounce.position.set(0, F + 0.3, 1);
    scene.add(bounce);

    // ── Controls (drag to look) ───────────────────────────────────────────

    let yaw = 0, pitch = 0;
    let isDragging = false, lastX = 0, lastY = 0;
    const SPEED = 0.0012, PLIMIT = Math.PI / 3;

    const cv = renderer.domElement;
    cv.style.cursor = 'grab';

    cv.addEventListener('mousedown', e => {
      isDragging = true; lastX = e.clientX; lastY = e.clientY;
      cv.style.cursor = 'grabbing';
    });
    window.addEventListener('mouseup', () => { isDragging = false; cv.style.cursor = 'grab'; });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      yaw   -= (e.clientX - lastX) * SPEED;
      pitch -= (e.clientY - lastY) * SPEED;
      pitch = Math.max(-PLIMIT, Math.min(PLIMIT, pitch));
      lastX = e.clientX; lastY = e.clientY;
    });
    cv.addEventListener('touchstart', e => {
      isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('touchmove', e => {
      if (!isDragging) return;
      yaw   -= (e.touches[0].clientX - lastX) * SPEED;
      pitch -= (e.touches[0].clientY - lastY) * SPEED;
      pitch = Math.max(-PLIMIT, Math.min(PLIMIT, pitch));
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // Idle drift with a gentle at-anchor sway
    let idleT = 0;
    function animate() {
      requestAnimationFrame(animate);
      idleT += 0.008;
      if (!isDragging) yaw += Math.sin(idleT * 0.02) * 0.00018;
      const sway = Math.sin(idleT * 0.55) * 0.006;
      camera.position.y = 0.25 + Math.sin(idleT * 0.4) * 0.008;
      const q = new THREE.Quaternion();
      q.setFromEuler(new THREE.Euler(pitch, yaw, sway, 'YXZ'));
      camera.quaternion.copy(q);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
