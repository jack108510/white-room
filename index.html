<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superyacht Salon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050a10; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(235, 210, 160, 0.62);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      pointer-events: none;
      text-align: center;
      text-shadow: 0 2px 10px #000;
    }
    #hotspots {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 5;
    }
    .spotBtn {
      border: 1px solid rgba(230,200,140,0.45);
      color: rgba(255,238,190,0.9);
      background: rgba(8,14,20,0.5);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 8px 12px;
      font: 600 11px system-ui, sans-serif;
      letter-spacing: .08em;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
    }
    .spotBtn:hover { background: rgba(60,45,25,0.72); }
    #walkpad {
      position: fixed;
      left: 18px;
      bottom: 24px;
      width: 132px;
      height: 132px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      z-index: 5;
      opacity: .82;
      user-select: none;
    }
    .padBtn {
      border: 1px solid rgba(230,200,140,0.35);
      border-radius: 14px;
      color: rgba(255,238,190,0.92);
      background: rgba(8,14,20,0.48);
      backdrop-filter: blur(8px);
      font: 700 18px system-ui, sans-serif;
      touch-action: none;
    }
    .padBtn:active { background: rgba(190,145,65,0.55); }
    .padEmpty { pointer-events: none; opacity: 0; }
    @media (min-width: 800px) { #walkpad { opacity: .55; } }
  </style>
</head>
<body>
  <div id="hotspots">
    <button class="spotBtn" data-x="0" data-z="1.1" data-yaw="0">SALON</button>
    <button class="spotBtn" data-x="0" data-z="8.5" data-yaw="0">AFT PASSAGE</button>
    <button class="spotBtn" data-x="0" data-z="14.1" data-yaw="0">OWNER SUITE</button>
    <button class="spotBtn" data-x="0" data-z="20.0" data-yaw="3.1416">OPEN DECK</button>
  </div>
  <div id="walkpad" aria-label="Walk controls">
    <div class="padEmpty"></div><button class="padBtn" data-key="forward">▲</button><div class="padEmpty"></div>
    <button class="padBtn" data-key="left">◀</button><button class="padBtn" data-key="boost">◆</button><button class="padBtn" data-key="right">▶</button>
    <div class="padEmpty"></div><button class="padBtn" data-key="back">▼</button><div class="padEmpty"></div>
  </div>
  <div id="hint">drag to look · WASD / arrows to walk · shift for speed · tap location bubbles</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
    import { VignetteShader } from 'three/addons/shaders/VignetteShader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1420);

    const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.05, 60);
    camera.position.set(0, 0.25, 4.3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.02;
    document.body.appendChild(renderer.domElement);

    // ── Environment (PMREM sunset for reflections on brass/glass/teak) ────

    function buildEnvScene() {
      const es = new THREE.Scene();
      const c = document.createElement('canvas');
      c.width = 64; c.height = 512;
      const ctx = c.getContext('2d');
      const g = ctx.createLinearGradient(0, 0, 0, 512);
      g.addColorStop(0, '#1c3350');     // zenith
      g.addColorStop(0.42, '#7fa3c2');
      g.addColorStop(0.5, '#ffd9a2');   // horizon glow
      g.addColorStop(0.56, '#c98a55');  // sunlit sea
      g.addColorStop(1, '#0d2236');     // deep water
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 64, 512);
      const t = new THREE.CanvasTexture(c);
      t.colorSpace = THREE.SRGBColorSpace;
      es.add(new THREE.Mesh(
        new THREE.SphereGeometry(50, 32, 24),
        new THREE.MeshBasicMaterial({ map: t, side: THREE.BackSide })
      ));
      // HDR sun ball low over the bow — hot specular highlight in the metals
      const sunBall = new THREE.Mesh(
        new THREE.SphereGeometry(3, 16, 12),
        new THREE.MeshBasicMaterial({ color: new THREE.Color(9, 6.5, 4) })
      );
      sunBall.position.set(0, 2.5, -45);
      es.add(sunBall);
      // faint warm overhead pool so ceilings read in reflections
      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(4, 12, 8),
        new THREE.MeshBasicMaterial({ color: new THREE.Color(1.6, 1.3, 0.9) })
      );
      glow.position.set(0, 46, 0);
      es.add(glow);
      return es;
    }
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(buildEnvScene(), 0.04).texture;
    pmrem.dispose();

    // ── Procedural textures ────────────────────────────────────────────────

    // Teak-and-holly sole: golden planks with pale holly stripes
    function teakTex(rx, ry) {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      const ctx = c.getContext('2d');
      const pw = 58;
      for (let x = 0; x < 512; x += pw) {
        const l = 33 + Math.random() * 9;
        ctx.fillStyle = `hsl(${24 + Math.random() * 7}, 58%, ${l}%)`;
        ctx.fillRect(x, 0, pw, 512);
        // grain streaks
        for (let i = 0; i < 22; i++) {
          const gx = x + 4 + Math.random() * (pw - 8);
          ctx.strokeStyle = `rgba(60,32,8,${0.06 + Math.random() * 0.12})`;
          ctx.lineWidth = 0.6 + Math.random() * 1.2;
          ctx.beginPath();
          ctx.moveTo(gx, 0);
          ctx.bezierCurveTo(gx + 6, 170, gx - 6, 340, gx + 3, 512);
          ctx.stroke();
        }
        // pale holly stripe between planks
        ctx.fillStyle = '#ddceA6';
        ctx.fillRect(x + pw - 4, 0, 4, 512);
        // subtle butt joints
        const jy = Math.random() * 512;
        ctx.fillStyle = 'rgba(40,20,5,0.35)';
        ctx.fillRect(x, jy, pw - 4, 1.5);
      }
      const t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(rx, ry);
      return t;
    }

    // Sunset ocean panorama for the bow windows
    function oceanTex() {
      const c = document.createElement('canvas');
      c.width = 2048; c.height = 512;
      const ctx = c.getContext('2d');
      const HOR = 300;

      const sky = ctx.createLinearGradient(0, 0, 0, HOR);
      sky.addColorStop(0, '#274a72');
      sky.addColorStop(0.5, '#7fa3c2');
      sky.addColorStop(0.85, '#f0b071');
      sky.addColorStop(1, '#ffd9a2');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, 2048, HOR);

      // sun and glow
      const glow = ctx.createRadialGradient(1024, HOR - 14, 8, 1024, HOR - 14, 220);
      glow.addColorStop(0, 'rgba(255,240,210,0.95)');
      glow.addColorStop(0.25, 'rgba(255,190,110,0.5)');
      glow.addColorStop(1, 'rgba(255,160,60,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, 2048, HOR + 40);
      ctx.beginPath();
      ctx.arc(1024, HOR - 26, 34, 0, Math.PI * 2);
      ctx.fillStyle = '#fff3da';
      ctx.fill();

      // soft clouds
      for (let i = 0; i < 26; i++) {
        const cy = 30 + Math.random() * (HOR - 90);
        ctx.fillStyle = `rgba(255,225,195,${0.05 + Math.random() * 0.12})`;
        ctx.beginPath();
        ctx.ellipse(Math.random() * 2048, cy, 60 + Math.random() * 160, 6 + Math.random() * 14, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // distant islands
      ctx.fillStyle = 'rgba(40,55,75,0.75)';
      ctx.beginPath();
      ctx.ellipse(320, HOR, 130, 16, 0, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(1760, HOR, 90, 10, 0, Math.PI, 0);
      ctx.fill();

      // sea
      const sea = ctx.createLinearGradient(0, HOR, 0, 512);
      sea.addColorStop(0, '#c98a55');
      sea.addColorStop(0.12, '#3f6a86');
      sea.addColorStop(1, '#142e44');
      ctx.fillStyle = sea;
      ctx.fillRect(0, HOR, 2048, 512 - HOR);

      // wave shimmer
      for (let i = 0; i < 700; i++) {
        const y = HOR + Math.pow(Math.random(), 1.6) * (512 - HOR);
        const w = 4 + Math.random() * (y - HOR) * 0.35;
        ctx.fillStyle = `rgba(200,225,240,${0.04 + Math.random() * 0.1})`;
        ctx.fillRect(Math.random() * 2048, y, w, 1.2);
      }
      // sun glitter path
      for (let i = 0; i < 240; i++) {
        const y = HOR + Math.pow(Math.random(), 1.4) * (512 - HOR);
        const spread = 40 + (y - HOR) * 0.55;
        ctx.fillStyle = `rgba(255,215,150,${0.12 + Math.random() * 0.3})`;
        ctx.fillRect(1024 + (Math.random() - 0.5) * spread, y, 3 + Math.random() * 10, 1.4);
      }

      // gulls
      ctx.strokeStyle = 'rgba(30,40,55,0.7)';
      ctx.lineWidth = 1.6;
      [[520, 120], [575, 100], [1420, 150]].forEach(([gx, gy]) => {
        ctx.beginPath();
        ctx.moveTo(gx - 9, gy);
        ctx.quadraticCurveTo(gx - 4, gy - 6, gx, gy);
        ctx.quadraticCurveTo(gx + 4, gy - 6, gx + 9, gy);
        ctx.stroke();
      });

      return new THREE.CanvasTexture(c);
    }

    // Small sky/sea view for portholes
    function portholeTex() {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 256;
      const ctx = c.getContext('2d');
      const HOR = 140;
      const sky = ctx.createLinearGradient(0, 0, 0, HOR);
      sky.addColorStop(0, '#5b84a8');
      sky.addColorStop(1, '#f4c286');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, 256, HOR);
      const sea = ctx.createLinearGradient(0, HOR, 0, 256);
      sea.addColorStop(0, '#b57e50');
      sea.addColorStop(0.2, '#38607c');
      sea.addColorStop(1, '#16324a');
      ctx.fillStyle = sea;
      ctx.fillRect(0, HOR, 256, 116);
      for (let i = 0; i < 90; i++) {
        const y = HOR + Math.random() * 116;
        ctx.fillStyle = `rgba(210,230,240,${0.05 + Math.random() * 0.14})`;
        ctx.fillRect(Math.random() * 256, y, 3 + Math.random() * 14, 1);
      }
      return new THREE.CanvasTexture(c);
    }

    // Framed nautical chart
    function chartTex() {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 384;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#e9dfc4';
      ctx.fillRect(0, 0, 512, 384);
      // coastline
      ctx.fillStyle = '#cdbd97';
      ctx.beginPath();
      ctx.moveTo(0, 60);
      ctx.bezierCurveTo(120, 20, 200, 140, 90, 220);
      ctx.bezierCurveTo(40, 270, 0, 240, 0, 240);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#6a5a38';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // depth contours
      for (let i = 0; i < 7; i++) {
        ctx.strokeStyle = `rgba(90,120,150,${0.25 + i * 0.06})`;
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(60 + i * 22, 380);
        ctx.bezierCurveTo(160 + i * 30, 260 - i * 12, 300 + i * 18, 300 - i * 20, 512, 180 - i * 14);
        ctx.stroke();
      }
      // soundings
      ctx.fillStyle = 'rgba(70,80,95,0.7)';
      for (let i = 0; i < 40; i++) {
        ctx.fillRect(140 + Math.random() * 360, 60 + Math.random() * 300, 2, 2);
      }
      // compass rose
      const cx = 400, cy = 110;
      ctx.strokeStyle = '#5a4a30';
      ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.arc(cx, cy, 46, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, 34, 0, Math.PI * 2); ctx.stroke();
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * (i % 2 ? 30 : 44), cy + Math.sin(a) * (i % 2 ? 30 : 44));
        ctx.stroke();
      }
      ctx.fillStyle = '#a03024';
      ctx.beginPath();
      ctx.moveTo(cx, cy - 46); ctx.lineTo(cx - 5, cy - 28); ctx.lineTo(cx + 5, cy - 28);
      ctx.closePath();
      ctx.fill();
      // rhumb lines
      ctx.strokeStyle = 'rgba(90,74,48,0.35)';
      ctx.lineWidth = 0.7;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * 500, cy + Math.sin(a) * 500);
        ctx.stroke();
      }
      return new THREE.CanvasTexture(c);
    }

    // Veined stone — cream Calacatta or black-gold onyx depending on palette
    function marbleTex(base, cloud, vein) {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 256;
      const ctx = c.getContext('2d');
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, 256, 256);
      for (let i = 0; i < 24; i++) {
        const x = Math.random() * 256, y = Math.random() * 256, r = 20 + Math.random() * 60;
        const g = ctx.createRadialGradient(x, y, 2, x, y, r);
        g.addColorStop(0, cloud);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(x - r, y - r, r * 2, r * 2);
      }
      for (let v = 0; v < 12; v++) {
        let x = Math.random() * 256, y = -10;
        ctx.strokeStyle = vein;
        ctx.lineWidth = 0.5 + Math.random() * 1.4;
        ctx.beginPath();
        ctx.moveTo(x, y);
        while (y < 266) {
          y += 12 + Math.random() * 22;
          x += (Math.random() - 0.5) * 34;
          ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      return new THREE.CanvasTexture(c);
    }

    // Abstract sunset-over-water canvas for the framed art
    function artTex() {
      const c = document.createElement('canvas');
      c.width = 384; c.height = 288;
      const ctx = c.getContext('2d');
      const bg = ctx.createLinearGradient(0, 0, 0, 288);
      bg.addColorStop(0, '#20364e');
      bg.addColorStop(0.55, '#8fa6b8');
      bg.addColorStop(0.62, '#e8c078');
      bg.addColorStop(1, '#1c2c3e');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, 384, 288);
      for (let i = 0; i < 46; i++) {
        const y = Math.random() * 288;
        ctx.fillStyle = `rgba(${210 + Math.random() * 45 | 0},${170 + Math.random() * 50 | 0},${90 + Math.random() * 60 | 0},${0.08 + Math.random() * 0.2})`;
        ctx.fillRect(Math.random() * 384, y, 30 + Math.random() * 120, 2 + Math.random() * 9);
      }
      ctx.fillStyle = 'rgba(255,230,180,0.9)';
      ctx.beginPath();
      ctx.arc(240, 152, 22, 0, Math.PI * 2);
      ctx.fill();
      return new THREE.CanvasTexture(c);
    }

    // ── Materials ─────────────────────────────────────────────────────────

    const floorTex  = teakTex(6, 2);
    const wtex      = teakTex(1.5, 1);
    const panelTex  = teakTex(3, 1);
    const seaTex    = oceanTex();
    const portTex   = portholeTex();
    const mapTex    = chartTex();
    const calaTex   = marbleTex('#f2eee6', 'rgba(196,188,170,0.20)', 'rgba(138,130,114,0.5)');
    const onyxTex   = marbleTex('#191410', 'rgba(96,68,32,0.18)', 'rgba(214,168,88,0.55)');
    const paintTex  = artTex();

    // Varnished teak: clearcoat gives the lacquered-wood sheen over the grain
    const mTeakF  = new THREE.MeshPhysicalMaterial({ map: floorTex, roughness: 0.2, metalness: 0, clearcoat: 0.95, clearcoatRoughness: 0.1, envMapIntensity: 1.05 });
    const mTeak   = new THREE.MeshPhysicalMaterial({ map: wtex, roughness: 0.42, metalness: 0, clearcoat: 0.55, clearcoatRoughness: 0.28, envMapIntensity: 0.75 });
    const mPanel  = new THREE.MeshPhysicalMaterial({ map: panelTex, roughness: 0.48, metalness: 0, clearcoat: 0.45, clearcoatRoughness: 0.32, envMapIntensity: 0.65 });
    // Cream lacquer hull panels: clearcoat sheen instead of flat matte
    const mHull   = new THREE.MeshPhysicalMaterial({ color: 0xf4eedd, roughness: 0.42, clearcoat: 0.6, clearcoatRoughness: 0.22, envMapIntensity: 0.55, side: THREE.DoubleSide });
    const mCeil   = new THREE.MeshStandardMaterial({ color: 0xfaf6ee, roughness: 0.95, envMapIntensity: 0.3 });
    // Polished brass: full metalness, tight roughness — lives off the envmap
    const mBrass  = new THREE.MeshPhysicalMaterial({ color: 0xc9a232, roughness: 0.16, metalness: 1.0, envMapIntensity: 1.25 });
    const mBrassS = new THREE.MeshPhysicalMaterial({ color: 0xc5a24a, roughness: 0.38, metalness: 0.9, envMapIntensity: 1.0 });
    // Upholstery: sheen for the fabric-fuzz rim light
    const mCream  = new THREE.MeshPhysicalMaterial({ color: 0xf6f1e6, roughness: 0.9, sheen: 0.6, sheenRoughness: 0.55, sheenColor: 0xfff2d8, envMapIntensity: 0.35 });
    const mNavy   = new THREE.MeshPhysicalMaterial({ color: 0x16263e, roughness: 0.92, sheen: 0.8, sheenRoughness: 0.5, sheenColor: 0x4a6a9a, envMapIntensity: 0.3 });
    const mRope   = new THREE.MeshStandardMaterial({ color: 0xcbb188, roughness: 1 });
    const mGlass  = new THREE.MeshPhysicalMaterial({ color: 0xbcd8e8, roughness: 0.04, metalness: 0, opacity: 0.13, transparent: true, envMapIntensity: 1.6, side: THREE.DoubleSide });
    const mGlassW = new THREE.MeshPhysicalMaterial({ color: 0xf4fbff, roughness: 0.05, metalness: 0, transmission: 1, thickness: 0.05, ior: 1.5, envMapIntensity: 1.2 });
    const mSea    = new THREE.MeshBasicMaterial({ map: seaTex, side: THREE.DoubleSide });
    const mPort   = new THREE.MeshBasicMaterial({ map: portTex });
    const mChart  = new THREE.MeshStandardMaterial({ map: mapTex, roughness: 0.85 });
    const mShade  = new THREE.MeshStandardMaterial({ color: 0xe8d9b0, roughness: 0.85, emissive: new THREE.Color(0x8a6828), emissiveIntensity: 0.6 });
    const mDownlt = new THREE.MeshStandardMaterial({ color: 0xfff0d0, emissive: new THREE.Color(0xffd890), emissiveIntensity: 1.4 });
    const mWhiteF = new THREE.MeshStandardMaterial({ color: 0xf4efe4, roughness: 0.6 });
    const mMarble = new THREE.MeshPhysicalMaterial({ map: calaTex, roughness: 0.1, clearcoat: 1, clearcoatRoughness: 0.06, envMapIntensity: 1.15 });
    const mOnyx   = new THREE.MeshPhysicalMaterial({ map: onyxTex, roughness: 0.08, clearcoat: 1, clearcoatRoughness: 0.05, envMapIntensity: 1.4 });
    const mChrome = new THREE.MeshPhysicalMaterial({ color: 0xf4f6f8, metalness: 1, roughness: 0.07, envMapIntensity: 1.5 });
    const mGold   = new THREE.MeshPhysicalMaterial({ color: 0xd8b478, roughness: 0.85, sheen: 1, sheenRoughness: 0.4, sheenColor: 0xffe8b0, envMapIntensity: 0.4 });
    const mLED    = new THREE.MeshStandardMaterial({ color: 0xffe9c8, emissive: new THREE.Color(0xffc987), emissiveIntensity: 2.4 });
    const mBottle = new THREE.MeshPhysicalMaterial({ color: 0x1e3c26, roughness: 0.06, clearcoat: 1, clearcoatRoughness: 0.04, envMapIntensity: 1.3 });
    const mAmber  = new THREE.MeshPhysicalMaterial({ color: 0x9a4e10, roughness: 0.05, metalness: 0, transmission: 0.85, thickness: 0.12, ior: 1.45, envMapIntensity: 1.2 });
    const mArt    = new THREE.MeshStandardMaterial({ map: paintTex, roughness: 0.75 });
    const mSeam   = new THREE.MeshStandardMaterial({ color: 0x9a8a70, roughness: 0.6 });

    // ── Helpers ───────────────────────────────────────────────────────────

    function box(w, h, d, mat, px, py, pz, ry = 0) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      m.position.set(px, py, pz);
      m.rotation.y = ry;
      m.castShadow = true;
      m.receiveShadow = true;
      scene.add(m);
      return m;
    }
    function cyl(rt, rb, h, seg, mat, px, py, pz, rx = 0, rz = 0) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
      m.position.set(px, py, pz);
      m.rotation.x = rx;
      m.rotation.z = rz;
      m.castShadow = true;
      m.receiveShadow = true;
      scene.add(m);
      return m;
    }
    function sph(r, mat, px, py, pz) {
      const m = new THREE.Mesh(new THREE.SphereGeometry(r, 16, 12), mat);
      m.position.set(px, py, pz);
      m.castShadow = true;
      scene.add(m);
      return m;
    }
    // Soft cushion: a squashed sphere reads as sewn upholstery, not a box
    function cushion(w, h, d, mat, px, py, pz, ry = 0, rx = 0, rz = 0) {
      const m = new THREE.Mesh(new THREE.SphereGeometry(0.5, 18, 12), mat);
      m.scale.set(w, h, d);
      m.position.set(px, py, pz);

    box(6.7, 0.07, 0.08, mBrass, 0, F + 0.78, 17.61);
    box(6.7, 0.07, 0.08, mBrass, 0, F + 2.0, 17.61);
    const sternSea = box(6.9, 2.2, 0.04, mSea, 0, 0.05, 17.9); sternSea.castShadow = false;
    // Bed / chaise wall and private writing desk
    box(2.45, 0.38, 1.2, mTeak, -1.45, F + 0.2, 14.6);
    cushion(2.5, 0.18, 1.25, mCream, -1.45, F + 0.52, 14.6);
    cushion(0.55, 0.42, 0.16, mNavy, -2.15, F + 0.72, 14.2, 0.25);
    cushion(0.55, 0.42, 0.16, mGold, -0.85, F + 0.72, 14.25, -0.2);
    box(1.25, 0.78, 0.58, mOnyx, 2.15, F + 0.39, 14.6);
    box(1.3, 0.035, 0.62, mMarble, 2.15, F + 0.82, 14.6);
    cyl(0.045, 0.07, 0.4, 14, mBrass, 1.8, F + 1.04, 14.55);
    cyl(0.16, 0.11, 0.18, 18, mShade, 1.8, F + 1.3, 14.55);
    box(0.04, 0.04, 5.9, mLED, -3.05, hh - 0.12, 14.55).castShadow = false;
    box(0.04, 0.04, 5.9, mLED,  3.05, hh - 0.12, 14.55).castShadow = false;
    [13.2, 15.3].forEach(z => { porthole(-1, z); porthole(1, z); });
    addDoorLabel('PRIVATE AFT DECK', 0, 0.95, 17.45);

    // Open aft deck with rails, loungers and sea beyond — reachable by walking through suite glass line
    box(7.4, 0.06, 4.6, mTeakF, 0, F, 20.25);
    box(0.08, 0.9, 4.4, mBrass, -3.65, F + 0.45, 20.25);
    box(0.08, 0.9, 4.4, mBrass,  3.65, F + 0.45, 20.25);
    box(7.2, 0.08, 0.08, mBrass, 0, F + 0.9, 22.5);
    for (let x = -3.2; x <= 3.21; x += 0.8) cyl(0.025, 0.025, 0.9, 8, mBrass, x, F + 0.45, 22.5);
    for (const x of [-1.25, 1.25]) {
      box(1.0, 0.22, 1.75, mCream, x, F + 0.2, 20.55, x * 0.08);
      cushion(0.9, 0.18, 0.72, mNavy, x, F + 0.45, 19.9, x * 0.08);
      box(0.8, 0.04, 0.5, mGold, x, F + 0.48, 21.25, x * 0.08);
    }
    cyl(0.45, 0.5, 0.06, 24, mMarble, 0, F + 0.44, 20.35);
    cyl(0.04, 0.04, 0.35, 10, mChrome, 0, F + 0.25, 20.35);
    const aftSea = box(11, 3, 0.04, mSea, 0, 0.2, 24.8); aftSea.castShadow = false;

    // ── Overhead: beams, downlights, bow pendant ──────────────────────────

    [-1.4, 0.6, 2.6, 4.6].forEach(z => box(RW - 0.3, 0.08, 0.16, mTeak, 0, hh - 0.06, z));

    const spots = [[-1.8, -0.5], [1.8, -0.5], [-1.8, 3.6], [1.8, 3.6], [0, 1.6], [3.6, 2.4], [-3.6, 2.4], [0, 4.6]];
    spots.forEach(([x, z]) => {
      cyl(0.07, 0.07, 0.025, 16, mBrass, x, hh - 0.045, z);
      cyl(0.048, 0.048, 0.012, 16, mDownlt, x, hh - 0.06, z);
    });

    // Pendant over the bow table
    cyl(0.015, 0.015, 0.36, 8, mBrass, 0, hh - 0.2, BOWC - 1.6);
    cyl(0.2, 0.27, 0.2, 20, mBrass, 0, hh - 0.46, BOWC - 1.6);
    cyl(0.16, 0.16, 0.02, 20, mDownlt, 0, hh - 0.55, BOWC - 1.6);

    // Warm LED cove strips around the overhead perimeter
    const coveL = box(0.035, 0.025, 7.7, mLED, -hw + 0.16, hh - 0.075, 1.5);
    const coveR = box(0.035, 0.025, 7.7, mLED,  hw - 0.16, hh - 0.075, 1.5);
    const coveA = box(7.6, 0.025, 0.035, mLED, 0, hh - 0.075, STERN - 0.14);
    const coveB = arcBand(3.86, 0.025, hh - 0.075, mLED, BOWC);
    [coveL, coveR, coveA, coveB].forEach(m => { m.castShadow = false; });

    // ── Lighting ──────────────────────────────────────────────────────────

    scene.add(new THREE.AmbientLight(0x362a1c, 0.85));

    // Main salon downlight (only shadow caster)
    const main = new THREE.PointLight(0xffe2b0, 2.4, 12);
    main.position.set(0, hh - 0.3, 0.9);
    main.castShadow = true;
    main.shadow.mapSize.set(1024, 1024);
    main.shadow.radius = 8;
    scene.add(main);

    // Pendant glow at the bow
    const bowP = new THREE.PointLight(0xffd9a8, 1.5, 8);
    bowP.position.set(0, hh - 0.65, BOWC - 1.6);
    scene.add(bowP);

    // Sunset spilling through the bow windows
    const sun = new THREE.PointLight(0xffb070, 1.5, 11);
    sun.position.set(0, 0.4, BOWC - 2.6);
    scene.add(sun);
    const skyFill = new THREE.PointLight(0x86a8c8, 0.55, 9);
    skyFill.position.set(0, 1.0, BOWC - 1.0);
    scene.add(skyFill);

    // Console lamp
    const lamp = new THREE.PointLight(0xffcc70, 0.8, 4);
    lamp.position.set(-3.5, F + 1.35, 2.4);
    scene.add(lamp);

    // Warm bounce off the teak sole
    const bounce = new THREE.PointLight(0x33220f, 0.4, 8);
    bounce.position.set(0, F + 0.3, 1);
    scene.add(bounce);

    // Spot pools over the bar, console and side table
    function pool(x, z, i = 9) {
      const s = new THREE.SpotLight(0xffd9a0, i, 7, 0.55, 0.85, 1.6);
      s.position.set(x, hh - 0.08, z);
      s.target.position.set(x, F, z);
      scene.add(s, s.target);
    }
    pool(3.6, 2.4);
    pool(-3.6, 2.4);
    pool(0, 0.55, 6);

    // Cove wash tinting the upper walls
    const coveWL = new THREE.PointLight(0xffc98a, 0.7, 6);
    coveWL.position.set(-3.2, hh - 0.25, 1.5);
    const coveWR = new THREE.PointLight(0xffc98a, 0.7, 6);
    coveWR.position.set(3.2, hh - 0.25, 1.5);
    scene.add(coveWL, coveWR);

    // ── Controls: drag-to-look + first-person walk + location bubbles ──

    let yaw = 0, pitch = 0;
    let isDragging = false, lastX = 0, lastY = 0;
    const SPEED = 0.0012, PLIMIT = Math.PI / 3;
    const EYE_Y = 0.28;
    const keys = { forward: false, back: false, left: false, right: false, boost: false };
    let targetSpot = null;

    const cv = renderer.domElement;
    cv.style.cursor = 'grab';

    function beginLook(x, y) { isDragging = true; lastX = x; lastY = y; cv.style.cursor = 'grabbing'; }
    function moveLook(x, y) {
      if (!isDragging) return;
      yaw   -= (x - lastX) * SPEED;
      pitch -= (y - lastY) * SPEED;
      pitch = Math.max(-PLIMIT, Math.min(PLIMIT, pitch));
      lastX = x; lastY = y;
    }
    cv.addEventListener('mousedown', e => beginLook(e.clientX, e.clientY));
    window.addEventListener('mouseup', () => { isDragging = false; cv.style.cursor = 'grab'; });
    window.addEventListener('mousemove', e => moveLook(e.clientX, e.clientY));
    cv.addEventListener('touchstart', e => {
      if (e.target.closest('#walkpad, #hotspots')) return;
      beginLook(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('touchmove', e => {
      if (e.target.closest('#walkpad, #hotspots')) return;
      moveLook(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    function setMove(code, on) {
      if (code === 'KeyW' || code === 'ArrowUp') keys.forward = on;
      if (code === 'KeyS' || code === 'ArrowDown') keys.back = on;
      if (code === 'KeyA' || code === 'ArrowLeft') keys.left = on;
      if (code === 'KeyD' || code === 'ArrowRight') keys.right = on;
      if (code === 'ShiftLeft' || code === 'ShiftRight') keys.boost = on;
    }
    window.addEventListener('keydown', e => { setMove(e.code, true); if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
    window.addEventListener('keyup', e => setMove(e.code, false));

    document.querySelectorAll('.padBtn').forEach(btn => {
      const k = btn.dataset.key;
      const on = e => { e.preventDefault(); keys[k] = true; targetSpot = null; };
      const off = e => { e.preventDefault(); keys[k] = false; };
      btn.addEventListener('pointerdown', on);
      btn.addEventListener('pointerup', off);
      btn.addEventListener('pointerleave', off);
      btn.addEventListener('pointercancel', off);
    });

    document.querySelectorAll('.spotBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        targetSpot = { x: parseFloat(btn.dataset.x), z: parseFloat(btn.dataset.z), yaw: parseFloat(btn.dataset.yaw) };
      });
    });

    // Soft path bounds: salon -> passage -> owner suite -> open aft deck.
    function clampWalk(pos) {
      let x = pos.x, z = pos.z;
      if (z < 5.35) {                    // salon + bow
        z = Math.max(-5.85, Math.min(5.35, z));
        const bowLimit = z < -2.35 ? Math.sqrt(Math.max(0.2, 3.45 * 3.45 - (z + 2.35) * (z + 2.35))) : 3.45;
        x = Math.max(-bowLimit, Math.min(bowLimit, x));
      } else if (z < 11.35) {            // narrow aft passage
        z = Math.max(5.35, Math.min(11.35, z));
        x = Math.max(-1.12, Math.min(1.12, x));
      } else if (z < 17.75) {            // owner suite
        z = Math.max(11.35, Math.min(17.75, z));
        x = Math.max(-2.85, Math.min(2.85, x));
      } else {                            // open deck
        z = Math.max(17.75, Math.min(22.15, z));
        x = Math.max(-3.25, Math.min(3.25, x));
      }
      pos.x = x; pos.z = z;
    }

    const clock = new THREE.Clock();
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // Idle drift with gentle at-anchor sway; movement cancels the location tween.
    let idleT = 0;
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      idleT += dt;

      let moving = false;
      const walkSpeed = (keys.boost ? 2.4 : 1.25) * dt;
      const forward = new THREE.Vector3(Math.sin(yaw), 0, -Math.cos(yaw));
      const right = new THREE.Vector3(Math.cos(yaw), 0, Math.sin(yaw));
      const step = new THREE.Vector3();
      if (keys.forward) { step.add(forward); moving = true; }
      if (keys.back)    { step.sub(forward); moving = true; }
      if (keys.right)   { step.add(right); moving = true; }
      if (keys.left)    { step.sub(right); moving = true; }
      if (moving) {
        targetSpot = null;
        step.normalize().multiplyScalar(walkSpeed);
        camera.position.add(step);
        clampWalk(camera.position);
      } else if (targetSpot) {
        const dx = targetSpot.x - camera.position.x;
        const dz = targetSpot.z - camera.position.z;
        const dist = Math.hypot(dx, dz);
        if (dist < 0.045) {
          camera.position.x = targetSpot.x; camera.position.z = targetSpot.z;
          yaw += (targetSpot.yaw - yaw) * 0.05;
          if (Math.abs(targetSpot.yaw - yaw) < 0.01) targetSpot = null;
        } else {
          camera.position.x += dx * Math.min(1, dt * 2.2);
          camera.position.z += dz * Math.min(1, dt * 2.2);
          clampWalk(camera.position);
        }
      } else if (!isDragging) yaw += Math.sin(idleT * 0.35) * 0.00008;

      const sway = Math.sin(idleT * 0.55) * 0.004;
      camera.position.y = EYE_Y + Math.sin(idleT * 0.4) * 0.006;
      const q = new THREE.Quaternion();
      q.setFromEuler(new THREE.Euler(pitch, yaw, sway, 'YXZ'));
      camera.quaternion.copy(q);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
